<section class="screen screen--panel screen--character-choice screen--presentation-screen is-active" data-screen="character-choice" data-presentation-mode="screen">
  <div class="screen__panel">
    <h1 class="screen__title">Scegli il tuo avatar</h1>
    <div class="screen__body">
      <ul class="character-list">
    <li>
      <button class="player player-1 character-alieno selected" type="button" value="alieno" data-character-choice data-character-id="hero" data-character-token="alieno" data-character-label="Alieno" aria-pressed="true" aria-label="Scegli Alieno">
        <span>
          <img src="assets/presentation/character-alieno-idle.gif" alt="Alieno">
        </span>
      </button>
      <span>Preparati a una formazione spaziale!</span>
    </li>
    <li>
      <button class="player player-1 character-robot" type="button" value="robot" data-character-choice data-character-id="character-2" data-character-token="robot" data-character-label="Robot" aria-pressed="false" aria-label="Scegli Robot">
        <span>
          <img src="assets/presentation/character-robot-idle.gif" alt="Robot">
        </span>
      </button>
      <span>Porta la formazione nel futuro!</span>
    </li>
      </ul>
    </div>
    
    <div class="screen__actions">
      <button class="button" type="button" data-screen-target="game-rules">Parti</button>
    </div>
  </div>
</section>
