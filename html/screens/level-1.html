<section class="screen screen--game-level screen--presentation-screen screen--hud-overlay is-active"
         data-screen="level-1" data-presentation-mode="screen" data-hud-mode="overlay">
    <div class="screen__game-shell screen__game-shell--overlay">
        <header class="screen__game-header">
            <div class="screen__hud-area screen__hud-area--header-left screen__hud-area--left screen__hud-area--row"
                 data-hud-zone="header" data-hud-area="left" data-hud-area-direction="row"></div>
            <div class="screen__hud-area screen__hud-area--header-center screen__hud-area--center screen__hud-area--column"
                 data-hud-zone="header" data-hud-area="center" data-hud-area-direction="column"><span
                    class="screen__hud-item screen__hud-item--lives" data-hud-element="lives" aria-label="Lives"><span
                    class="screen__hud-lives" data-hud-lives aria-hidden="true"><span class="screen__hud-life"
                                                                                      data-hud-life
                                                                                      data-state="filled"></span><span
                    class="screen__hud-life" data-hud-life data-state="filled"></span><span class="screen__hud-life"
                                                                                            data-hud-life
                                                                                            data-state="empty"></span></span><span
                    class="screen__hud-text">Lives</span></span><span class="screen__hud-item screen__hud-item--time"
                                                                      data-hud-element="time" aria-label="Time"><span
                    class="screen__hud-timeline" data-hud-timeline aria-hidden="true"></span><span
                    class="screen__hud-time-value" data-hud-time-value>30s</span></span></div>
            <div class="screen__hud-area screen__hud-area--header-right screen__hud-area--right screen__hud-area--row"
                 data-hud-zone="header" data-hud-area="right" data-hud-area-direction="row"></div>
        </header>
        <div class="runner-mount" data-gameplay-runner data-screen-id="level-1" aria-label="Level 1 runner"></div>
        <footer class="screen__game-footer">
            <div class="screen__hud-area screen__hud-area--footer-left screen__hud-area--left screen__hud-area--row"
                 data-hud-zone="footer" data-hud-area="left" data-hud-area-direction="row"></div>
            <div class="screen__hud-area screen__hud-area--footer-center screen__hud-area--center screen__hud-area--row"
                 data-hud-zone="footer" data-hud-area="center" data-hud-area-direction="row">
                <div class="screen__actions">
                    <button class="button" type="button" data-screen-target="level-complete">Complete</button>
                    <button class="button" type="button" data-screen-target="life-lost">Retry</button>
                    <button class="button" type="button" data-screen-target="life-zero">Fail</button>
                </div>
            </div>
            <div class="screen__hud-area screen__hud-area--footer-right screen__hud-area--right screen__hud-area--row"
                 data-hud-zone="footer" data-hud-area="right" data-hud-area-direction="row"></div>
        </footer>
    </div>
</section>
