<section class="screen screen--result screen--feedback screen--life-lost screen--presentation-modal is-active" data-screen="life-lost" data-presentation-mode="modal" data-result-state="life-lost">
  <div class="screen__panel screen__result-panel" role="dialog" aria-modal="true" aria-labelledby="life-lost-title">
    <h2 class="screen__eyebrow screen__result-kicker">Peccato!</h2>
    <h2 id="life-lost-title" class="screen__title screen__result-title">Ma non è<br>ancora<br>finita!</h2>
    <p class="screen__body screen__result-body">
      <span class="character-idle character-{{currentCharacter}}"></span>
    </p>
    <div class="screen__actions screen__result-actions">
      <button class="button button--primary screen__result-button screen__result-button--primary" type="button" data-runner-control="retry" data-screen-target="level-1">Riparti</button>
      <a class="button button--secondary screen__result-button screen__result-button--secondary" href="https://www.skilla.com/app-e-piattaforme/skilla-hub/?utm_source=game&utm_medium=link&utm_campaign=LMS&utm_content=Skilla+HUB#video01" data-result-funnel-link>Scopri Skilla Hub</a>
    </div>
  </div>
</section>
